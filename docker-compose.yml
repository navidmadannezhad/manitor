# Full stack: API + static dashboard. From your machine, the UI calls the API at localhost:5000.
services:
  server:
    build: ./server
    ports:
      - "9292:9293"
    volumes:
      - server_data:/data
    environment:
      SERVER_CLIENT: ":9293"
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_SERVER_BASE_URL: ${VITE_SERVER_BASE_URL:-http://localhost:9293}
    ports:
      - "9293:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server_data:
