# Full stack: API + static dashboard. From your machine, the UI calls the API at localhost:5000.
services:
  server:
    build: ./server
    ports:
      - "9292:9293"
    environment:
      SERVER_CLIENT: ":9293"
      DB_HOST: ${DB_HOST:-postgres-kalif}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-manitor}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
    networks:
      - devopsio
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_SERVER_BASE_URL: ${VITE_SERVER_BASE_URL:-http://localhost:9293}
    ports:
      - "9293:80"
    depends_on:
      - server
    networks:
      - devopsio
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  devopsio:
    name: devopsio
    external: true
  